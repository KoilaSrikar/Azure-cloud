<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Cloud Assistant - SAARA Systems</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="ai-assistant.css">
</head>
<body class="ai-assistant-body">
    <header class="ai-header">
        <div class="container">
            <div class="ai-header-content">
                <a href="index.html" class="back-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                    Back to Home
                </a>
                <div class="ai-brand">
                    <img src="images/saara-logo-icon.jpg" alt="SAARA Systems">
                    <span>AI Cloud Assistant</span>
                </div>
            </div>
        </div>
    </header>

    <main class="ai-main">
        <div class="container">
            <section class="ai-hero">
                <h1>AI Cloud Assistant</h1>
                <p>Ask anything about Azure, Data Engineering, AI Solutions, Cloud Migration, Cost Optimization</p>
            </section>

            <div class="ai-chat-container">
                <!-- Left Sidebar - Suggested Questions -->
                <aside class="ai-sidebar">
                    <div class="suggested-questions">
                        <h3>Suggested Questions</h3>
                        <div class="question-list">
                            <button class="question-btn" data-question="How can Azure reduce my cloud cost?">
                                💰 How can Azure reduce my cloud cost?
                            </button>
                            <button class="question-btn" data-question="What data engineering services do you offer?">
                                📊 What data engineering services do you offer?
                            </button>
                            <button class="question-btn" data-question="How does Azure AI help my business?">
                                🤖 How does Azure AI help my business?
                            </button>
                            <button class="question-btn" data-question="What is Azure migration?">
                                ☁️ What is Azure migration?
                            </button>
                            <button class="question-btn" data-question="Explain Azure DevOps solutions">
                                🔧 Explain Azure DevOps solutions
                            </button>
                        </div>
                    </div>

                    <div class="chat-actions">
                        <button class="action-btn" id="clearChat">
                            🗑️ Clear Chat
                        </button>
                        <button class="action-btn" id="downloadChat">
                            💾 Download Chat
                        </button>
                    </div>
                </aside>

                <!-- Chat Window -->
                <section class="ai-chat-window">
                    <div class="chat-header">
                        <div class="bot-info">
                            <div class="bot-avatar">🤖</div>
                            <div class="bot-details">
                                <h3>Azure Solutions Assistant</h3>
                                <span class="status">Online</span>
                            </div>
                        </div>
                    </div>

                    <div class="chat-messages" id="chatMessages">
                        <!-- Welcome message will be inserted here -->
                    </div>

                    <div class="chat-input-container">
                        <div class="input-wrapper">
                            <textarea 
                                id="messageInput" 
                                placeholder="Ask me about Azure, data engineering, AI solutions, migration, or security..."
                                rows="1"
                                maxlength="500"
                            ></textarea>
                            <button class="send-btn" id="sendBtn">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                                </svg>
                            </button>
                        </div>
                        <div class="input-footer">
                            <span class="char-count">0 / 500</span>
                            <span class="typing-indicator" id="typingIndicator" style="display: none;">
                                🤖 Assistant is typing...
                            </span>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <script src="ai-assistant.js"></script>
</body>
</html>
