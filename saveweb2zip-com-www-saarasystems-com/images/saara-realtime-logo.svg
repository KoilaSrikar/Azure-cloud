<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Animated Background Circle -->
  <circle cx="30" cy="30" r="25" fill="none" stroke="#0078D4" stroke-width="2">
    <animate attributeName="r" values="25;27;25" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Real-time Pulse Lines -->
  <circle cx="30" cy="30" r="20" fill="none" stroke="#00d4ff" stroke-width="1.5">
    <animate attributeName="r" values="20;22;20" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Core Logo Elements -->
  <g transform="translate(60, 60)">
    <!-- Cloud Shape -->
    <path d="M -12 -8 Q -15 -12 -9 -12 L 9 -12 Q 12 -12 12 -8 Q 12 -3 9 0 L -9 0 Q -12 -3 -12 -8" 
          fill="#0078D4" stroke="none"/>
    
    <!-- Data Flow Lines -->
    <line x1="-18" y1="-15" x2="-12" y2="-12" stroke="#00d4ff" stroke-width="3">
      <animate attributeName="x2" values="-12;-9;-12" dur="1.5s" repeatCount="indefinite"/>
    </line>
    <line x1="18" y1="-15" x2="12" y2="-12" stroke="#00d4ff" stroke-width="3">
      <animate attributeName="x2" values="12;9;12" dur="1.5s" repeatCount="indefinite"/>
    </line>
    
    <!-- Real-time Dots -->
    <circle cx="-18" cy="-15" r="3" fill="#00d4ff">
      <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="18" cy="-15" r="3" fill="#00d4ff">
      <animate attributeName="opacity" values="0;1;0" dur="1.5s" begin="0.75s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Company Name -->
  <text x="140" y="55" font-family="Inter, sans-serif" font-size="36" font-weight="700" fill="#0078D4">
    SAARA
  </text>
  <text x="140" y="85" font-family="Inter, sans-serif" font-size="20" font-weight="500" fill="#64748b">
    SYSTEMS
  </text>
  
  <!-- Real-time Indicator -->
  <g transform="translate(140, 100)">
    <circle cx="0" cy="0" r="6" fill="#00d4ff">
      <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="15" cy="0" r="6" fill="#00d4ff">
      <animate attributeName="opacity" values="1;0.3;1" dur="1s" begin="0.33s" repeatCount="indefinite"/>
    </circle>
    <circle cx="30" cy="0" r="6" fill="#00d4ff">
      <animate attributeName="opacity" values="1;0.3;1" dur="1s" begin="0.66s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
